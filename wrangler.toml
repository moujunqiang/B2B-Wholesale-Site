name = "b2b-wholesale-site"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[site]
bucket = "./public"

[build]
command = ""

[[d1_databases]]
binding = "DB"
database_name = "b2b_wholesale_db"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "b2b-wholesale-media"